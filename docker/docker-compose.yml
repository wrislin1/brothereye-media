# =============================================================================
# Brother Eye Media Stack - Main Docker Compose (root)
# =============================================================================
# Requires Docker Compose v2.20+ for 'include:' support.
# Project name pinned for stable resource names.
# =============================================================================

name: brothereye-media

# -----------------------------------------------------------------------------
# Include Service Definitions (modular)
# -----------------------------------------------------------------------------
include:
  # VPN layer - must be first as NZBGet depends on it
  - compose/gluetun.yml

  # Download stack (routes through VPN via network_mode: service:gluetun)
  - compose/nzbget.yml

  # Indexer management
  - compose/prowlarr.yml

  # Content automation
  - compose/sonarr.yml
  - compose/radarr.yml
  - compose/bazarr.yml
  - compose/lazylibrarian.yml

  # Media server
  - compose/jellyfin.yml
  - compose/stremio.yml
  - compose/audiobookshelf.yml

  # Request management
  - compose/jellyseerr.yml
  - compose/kiwix.yml
  - compose/lg-tv-wol.yml

  # Reverse proxy (optional; enable via profile or comment out)
  - compose/caddy.yml

# -----------------------------------------------------------------------------
# Shared Network (defined exactly once here)
# -----------------------------------------------------------------------------
networks:
  media-network:
    name: media-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# -----------------------------------------------------------------------------
# (Optional) Global defaults via YAML anchors (use in child files if desired)
# -----------------------------------------------------------------------------
x-common-env: &common-env
  TZ: ${TZ:-America/New_York}
  PUID: ${PUID:-1000}
  PGID: ${PGID:-100}
  UMASK: ${UMASK:-002}

# Uncomment to enforce consistent log rotation across services:
# x-logging: &common-logging
#   driver: "json-file"
#   options:
#     max-size: "50m"
#     max-file: "3"

# -----------------------------------------------------------------------------
# Profiles (optional)
# -----------------------------------------------------------------------------
# You can add `profiles: ["edge"]` etc. inside individual service files
# to toggle experimental or optional services without editing this file.
#
# Example in compose/caddy.yml:
# services:
#   caddy:
#     profiles: ["public"]
#
# Then run only when needed:
#   docker compose --profile public up -d
# -----------------------------------------------------------------------------

# =============================================================================
# Notes
# =============================================================================
# Start order:
#   1) Gluetun (VPN)
#   2) NZBGet (shares Gluetun network namespace)
#   3) All other services on media-network
#
# Access (replace LXC_IP with your container IP, e.g., 192.168.80.110):
#   Jellyfin    http://LXC_IP:8096
#   NZBGet      http://LXC_IP:6789   (published by Gluetun)
#   Prowlarr    http://LXC_IP:9696
#   Sonarr      http://LXC_IP:8989
#   Radarr      http://LXC_IP:7878
#   Bazarr      http://LXC_IP:6767
#   Jellyseerr  http://LXC_IP:5055
#   Caddy       http://LXC_IP:80 / https://LXC_IP:443
#
# Tips:
# - Bind ports to the LXC IP in child files for LAN-only exposure
#   e.g., "192.168.80.110:8096:8096"
# - Keep all *network definitions* in this file; child files should
#   only reference `- media-network`.
# - Ensure `.env` (symlinked to .env.production) is present.
# - Validate config before starting: `docker compose config`
