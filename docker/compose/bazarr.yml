---
# ============================================================================
# Bazarr - Subtitle Management Service
# File: docker/compose/bazarr.yml
# ============================================================================

services:
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    hostname: bazarr
    restart: unless-stopped

    networks:
      - media-network

    # LAN admin access only — not proxied through Caddy
    ports:
      - "192.168.80.110:6767:6767"

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-100}
      - TZ=${TZ:-America/New_York}
      - UMASK=${UMASK:-002}

    volumes:
      # Config
      - ${CONFIG_BASE:-/opt/docker/config}/bazarr:/config

      # Media (RW to write subtitle files)
      - ${MEDIA_ROOT:-/mnt/media}/TV:/tv
      - ${MEDIA_ROOT:-/mnt/media}/Movies:/movies

    # Resource guard (Compose v2 honors mem_limit outside Swarm)
    mem_limit: ${BAZARR_MEM_LIMIT:-512m}

    labels:
      - "com.brothereye.service=bazarr"
      - "com.brothereye.description=Subtitle management for Sonarr and Radarr"
      - "com.brothereye.port=6767"
      - "com.brothereye.url=http://${LXC_IP}:6767"

    # Healthcheck: simple home page probe (no auth required)
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:6767/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
