---
# ============================================================================
# Jellyfin - Media Server with Hardware Transcoding
# File: docker/compose/jellyfin.yml
# ============================================================================

services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    hostname: jellyfin
    restart: unless-stopped

    # Network (defined once in top-level docker-compose.yml)
    networks:
      - media-network

    # No host ports needed — Caddy proxies via Docker network.
    # DLNA/discovery kept on LXC IP for LAN devices only.
    ports:
      - "192.168.80.110:7359:7359/udp"   # Service discovery (LAN only)
      - "192.168.80.110:1900:1900/udp"   # DLNA discovery (LAN only)

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-100}
      - TZ=${TZ:-America/New_York}
      - JELLYFIN_PublishedServerUrl=${JELLYFIN_URL:-http://localhost:8096}

    volumes:
      # Configuration and cache
      - ${CONFIG_ROOT:-/opt/docker/config}/jellyfin/config:/config
      - ${CONFIG_ROOT:-/opt/docker/config}/jellyfin/cache:/cache

      # Media libraries (read-only recommended)
      - ${MEDIA_ROOT:-/mnt/media}/Movies:/data/movies:ro
      - ${MEDIA_ROOT:-/mnt/media}/TV:/data/tv:ro
      # Optional:
      # - ${MEDIA_ROOT:-/mnt/media}/Music:/data/music:ro
      # - ${MEDIA_ROOT:-/mnt/media}/Photos:/data/photos:ro

    # GPU passthrough for VAAPI (adjust card index if needed)
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card1:/dev/dri/card1

    # Add both common groups; keep the one that matches your host/container
    group_add:
      - "44"   # video
      - "104"  # render

    # Resource guard (non-swarm; Compose v2 honors mem_limit)
    mem_limit: ${JELLYFIN_MEM_LIMIT:-4g}

    labels:
      - "com.brothereye.service=jellyfin"
      - "com.brothereye.description=Media server with hardware transcoding"
      - "com.brothereye.port=8096"
      - "com.brothereye.url=http://localhost:8096"

    # Healthcheck: root page should return 200 once ready
    healthcheck:
      test: ["CMD-SHELL", "(wget -qO- http://127.0.0.1:8096/System/Ping || curl -fsS http://127.0.0.1:8096/System/Ping) | grep -qi 'pong'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
