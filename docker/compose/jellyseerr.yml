---
# ============================================================================
# Jellyseerr - Media Request Management for Jellyfin
# File: docker/compose/jellyseerr.yml
# ============================================================================

services:
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    hostname: jellyseerr
    restart: unless-stopped

    networks:
      - media-network

    # No host ports needed — Caddy proxies via Docker network.

    environment:
      - TZ=${TZ:-America/New_York}
      - LOG_LEVEL=${JELLYSEERR_LOG_LEVEL:-info}
      - JELLYFIN_TYPE=jellyfin

    volumes:
      - ${CONFIG_BASE:-/opt/docker/config}/jellyseerr:/app/config

    # Resource guard (Compose v2 honors mem_limit)
    mem_limit: ${JELLYSEERR_MEM_LIMIT:-512m}

    labels:
      - "com.brothereye.service=jellyseerr"
      - "com.brothereye.description=Media request management for Jellyfin"
      - "com.brothereye.port=5055"
      - "com.brothereye.url=http://${LXC_IP}:5055"

    # Healthcheck: returns 200 when ready
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');http.get('http://127.0.0.1:5055/api/v1/status',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
