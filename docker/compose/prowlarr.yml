################################################################################
# Prowlarr - Indexer Manager
################################################################################
services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    hostname: prowlarr

    # LAN admin access only — not proxied through Caddy
    ports:
      - "192.168.80.110:9696:9696"

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-100}
      - TZ=${TZ:-America/New_York}
      - UMASK=${UMASK:-002}

    volumes:
      - ${CONFIG_BASE:-/opt/docker/config}/prowlarr:/config
      # Optional custom definitions:
      # - ${CONFIG_BASE:-/opt/docker/config}/prowlarr-definitions:/config/Definitions:ro

    networks:
      - media-network

    restart: ${RESTART_POLICY:-unless-stopped}

    # Healthcheck: Prowlarr returns 200 on /ping when healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9696/ping >/dev/null || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s

    # Resource guard (Compose v2 honors mem_limit outside Swarm)
    mem_limit: ${PROWLARR_MEM_LIMIT:-512m}

    labels:
      - "com.brothereye.service=prowlarr"
      - "com.brothereye.description=Indexer manager for *Arr apps"
      - "com.brothereye.group=automation"
      - "com.brothereye.url=http://${LXC_IP}:9696"
