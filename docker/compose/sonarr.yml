################################################################################
# Sonarr - TV Show Automation
################################################################################
services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    hostname: sonarr

    # LAN admin access only — not proxied through Caddy
    ports:
      - "192.168.80.110:8989:8989"

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-100}
      - TZ=${TZ:-America/New_York}
      - UMASK=${UMASK:-002}

    volumes:
      # Config (db, logs, backups)
      - ${CONFIG_BASE:-/opt/docker/config}/sonarr:/config
      # Library managed by Sonarr
      - ${TV_DIR:-/mnt/media/TV}:/tv
      # Completed downloads (import source)
      - ${DOWNLOADS_DIR:-/mnt/downloads}:/downloads
      # Optional: separate anime root
      # - ${ANIME_DIR:-/mnt/media/Anime}:/anime

    networks:
      - media-network

    restart: ${RESTART_POLICY:-unless-stopped}

    # Healthcheck: Sonarr returns 200 on /ping when healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8989/ping >/dev/null || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s

    # Resource guard (Compose v2 honors mem_limit outside Swarm)
    mem_limit: ${SONARR_MEM_LIMIT:-1g}

    labels:
      - "com.brothereye.service=sonarr"
      - "com.brothereye.description=TV show automation and management"
      - "com.brothereye.group=automation"
      - "com.brothereye.url=http://${LXC_IP}:8989"
