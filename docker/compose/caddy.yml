services:
  caddy:
    build:
      context: ${CONFIG_BASE}/caddy
      dockerfile: Dockerfile
    image: local/caddy-cloudflare:latest
    container_name: caddy
    hostname: caddy
    restart: unless-stopped
    networks:
      - media-network
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - ACME_EMAIL=${ACME_EMAIL}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${CONFIG_BASE}/caddy:/etc/caddy:ro
      - ${CONFIG_BASE}/caddy/data:/data
      - ${CONFIG_BASE}/caddy/config:/config
    mem_limit: ${CADDY_MEM_LIMIT}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
