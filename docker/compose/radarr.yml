################################################################################
# Radarr - Movie Automation
################################################################################
services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    hostname: radarr

    # LAN admin access only — not proxied through Caddy
    ports:
      - "192.168.80.110:7878:7878"

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-100}
      - TZ=${TZ:-America/New_York}
      - UMASK=${UMASK:-002}

    volumes:
      # Config (db, logs, backups)
      - ${CONFIG_BASE:-/opt/docker/config}/radarr:/config
      # Library managed by Radarr
      - ${MOVIES_DIR:-/mnt/media/Movies}:/movies
      # Completed downloads (import source)
      - ${DOWNLOADS_DIR:-/mnt/downloads}:/downloads
      # Optional 4K library
      # - ${MOVIES_4K_DIR:-/mnt/media/Movies-4K}:/movies-4k

    networks:
      - media-network

    restart: ${RESTART_POLICY:-unless-stopped}

    # Healthcheck: Radarr returns 200 on /ping when healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:7878/ping >/dev/null || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s

    # Resource guard (Compose v2 honors mem_limit outside Swarm)
    mem_limit: ${RADARR_MEM_LIMIT:-1g}

    labels:
      - "com.brothereye.service=radarr"
      - "com.brothereye.description=Movie automation and management"
      - "com.brothereye.group=automation"
      - "com.brothereye.url=http://${LXC_IP}:7878"
