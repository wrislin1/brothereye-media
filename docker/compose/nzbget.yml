services:
  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: nzbget
    # Removed: network_mode: "service:gluetun"
    # Removed: depends_on: [gluetun]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=${UMASK:-002}
    volumes:
      - /mnt/downloads:/downloads
      - /mnt/scratch:/scratch
      - ${CONFIG_BASE:-/opt/docker/config}/nzbget:/config
    # LAN admin access only
    ports:
      - "192.168.80.110:6789:6789"
    networks:
      - media-network        # join your normal app network
    dns:
      - 9.9.9.9
    restart: unless-stopped
    healthcheck:
      # Runs inside the nzbget container, so localhost is correct
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6789/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 10
